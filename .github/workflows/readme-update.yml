name: Update README Task List
on:
  push:
    branches: [ master ] # Trigger: When you push to master

jobs:
  build:
    runs-on: ubuntu-latest # Runner: A fresh Linux VM
    steps:
      - uses: actions/checkout@v4 # Step 1: Get your code
      
- name: Update README
        run: |
          python3 -c "
          import os

          # 1. Get the file list
          # We use os.popen to run the shell command and read its output
          file_list = os.popen('ls -R').read()

          # 2. Read the current README
          with open('README.md', 'r') as f:
              content = f.read()

          # 3. Define our markers
          start_marker = '<!-- AUTO-UPDATE-START -->'
          end_marker = '<!-- AUTO-UPDATE-END -->'

          # 4. Create the new content block
          new_block = f'{start_marker}\n\n{file_list}\n{end_marker}'

          # 5. Replace the old block with the new one
          # This finds everything between markers and swaps it
          import re
          pattern = re.compile(f'{start_marker}.*?{end_marker}', re.DOTALL)
          updated_content = re.sub(pattern, new_block, content)

          # 6. Write it back to the file
          with open('README.md', 'w') as f:
              f.write(updated_content)
          "

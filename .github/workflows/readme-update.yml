name: Update README Task List
on:
  push:
    branches: [ master ] # Trigger: When you push to master

jobs:
  build:
    runs-on: ubuntu-latest # Runner: A fresh Linux VM
    steps:
      - uses: actions/checkout@v4

      - name: Update README
        run: |
          python3 -c "
          import os, re
          file_list = os.popen('ls -R').read()
          with open('README.md', 'r') as f:
              content = f.read()
          
          start_marker = '<!-- AUTO-UPDATE-START -->'
          end_marker = '<!-- AUTO-UPDATE-END -->'
          new_block = f'{start_marker}\n\n{file_list}\n{end_marker}'
          
          pattern = re.compile(f'{start_marker}.*?{end_marker}', re.DOTALL)
          updated_content = re.sub(pattern, new_block, content)
          
          with open('README.md', 'w') as f:
              f.write(updated_content)
          "

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions'
          git add .
          git commit -m "Auto-update README with Python" || echo "No changes to commit"
          git push
